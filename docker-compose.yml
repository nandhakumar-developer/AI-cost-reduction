version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: markitdown
      POSTGRES_PASSWORD: markitdown
      POSTGRES_DB: markitdown
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://markitdown:markitdown@postgres:5432/markitdown
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: change-me-in-production
      ALLOW_DEV_AUTH: 'true'
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
